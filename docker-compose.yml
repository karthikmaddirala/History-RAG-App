services:
  backend-dev:
    build: .
    profiles: ["dev"]
    env_file: .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live code reload
      - ./chroma_dev:/app/chroma_dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend-test:
    build: .
    profiles: ["test"]
    env_file: .env.test
    volumes:
      - ./chroma_test:/app/chroma_test
    command: python -m pytest tests/ -v
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend-prod:
    build: .
    profiles: ["prod"]
    env_file: .env.prod
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_prod:/app/chroma_prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    profiles: ["dev", "prod"]
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db --default-artifact-root /mlflow/mlruns
